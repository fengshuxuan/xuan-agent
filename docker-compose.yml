services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: xuan_agent
      POSTGRES_USER: xuan_agent
      POSTGRES_PASSWORD: xuan_agent
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://xuan_agent:xuan_agent@postgres:5432/xuan_agent
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./workspace:/app/workspace
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: rq worker xuan-agent --url redis://redis:6379/0
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://xuan_agent:xuan_agent@postgres:5432/xuan_agent
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./workspace:/app/workspace
    depends_on:
      - postgres
      - redis

  frontend:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000

volumes:
  postgres_data:
